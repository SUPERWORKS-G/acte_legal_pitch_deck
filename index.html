<script>(function(){const pages=document.querySelectorAll('.page');const total=pages.length;const nav=document.getElementById('nav');let idx=0;pages[0].classList.add('current');let locked=false;function go(d){if(locked)return;const n=Math.max(0,Math.min(total-1,idx+d));if(n===idx)return;pages[idx].classList.remove('current');pages[n].classList.add('current');idx=n;locked=true;setTimeout(()=>{locked=false;},700);}nav.focus();document.addEventListener('focusin',()=>{setTimeout(()=>nav.focus(),0);});function onKey(e){const k=e.key;if(k==='ArrowRight'||k==='PageDown'||k===' '||k==='Enter'){e.preventDefault();go(1);}else if(k==='ArrowLeft'||k==='PageUp'||k==='Backspace'){e.preventDefault();go(-1);}else if(k==='Home'){e.preventDefault();pages[idx].classList.remove('current');idx=0;pages[0].classList.add('current');}else if(k==='End'){e.preventDefault();pages[idx].classList.remove('current');idx=total-1;pages[idx].classList.add('current');}}nav.addEventListener('keydown',onKey);document.addEventListener('keydown',onKey,true);nav.addEventListener('wheel',(e)=>{e.preventDefault();const d=Math.abs(e.deltaX)>Math.abs(e.deltaY)?e.deltaX:e.deltaY;if(Math.abs(d)<4)return;go(d>0?1:-1);},{passive:false});let tx=0;nav.addEventListener('touchstart',(e)=>{tx=e.touches[0].clientX;},{passive:true});nav.addEventListener('touchend',(e)=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>40)go(dx<0?1:-1);},{passive:true});nav.addEventListener('click',()=>go(1));})();</script>
